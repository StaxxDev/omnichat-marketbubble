<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OmniChat Edge — Unified Chat Aggregator</title>
<style>
  :root {
    --bg: #0b0e13;
    --panel: #11161f;
    --line: #1f2733;
    --text: #e7edf5;
    --muted: #8a97a8;
    --twitch: #9146FF;
    --x: #1D9BF0;
    --kick: #53FC18;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    background: var(--panel);
  }
  .brand { font-weight: 700; font-size: 16px; letter-spacing: .3px; }
  .brand .edge { color: var(--kick); }
  .status { color: var(--muted); font-size: 12px; }
  .status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#e74c3c; margin-right:5px; vertical-align:middle; }
  .status.live .dot { background: var(--kick); }
  .spacer { flex: 1; }
  .toggles { display: flex; gap: 8px; }
  .toggle {
    cursor: pointer;
    border: 1px solid var(--line);
    background: #0e131b;
    color: var(--text);
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    user-select: none;
    display: flex; align-items: center; gap: 6px;
    opacity: .45;
    transition: opacity .12s, border-color .12s;
  }
  .toggle.on { opacity: 1; }
  .toggle.twitch.on { border-color: var(--twitch); box-shadow: 0 0 0 1px var(--twitch) inset; }
  .toggle.x.on { border-color: var(--x); box-shadow: 0 0 0 1px var(--x) inset; }
  .toggle.kick.on { border-color: var(--kick); box-shadow: 0 0 0 1px var(--kick) inset; }

  #feedwrap { flex: 1; overflow-y: auto; padding: 8px 0 40px; }
  .row {
    display: flex;
    gap: 8px;
    padding: 4px 14px;
    align-items: baseline;
    border-bottom: 1px solid rgba(255,255,255,.025);
  }
  .row:hover { background: rgba(255,255,255,.03); }
  .badge {
    flex: 0 0 auto;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .4px;
    padding: 1px 7px;
    border-radius: 5px;
    color: #05080d;
    min-width: 78px;
    text-align: center;
  }
  .badge.twitch { background: var(--twitch); color:#fff; }
  .badge.x { background: var(--x); color:#fff; }
  .badge.kick { background: var(--kick); color:#04210a; }
  .chan { color: var(--muted); flex: 0 0 auto; }
  .chan::before { content: "#"; opacity: .6; }
  .author { font-weight: 700; flex: 0 0 auto; }
  .author::after { content: ":"; color: var(--muted); font-weight: 400; }
  .text { flex: 1; word-break: break-word; }
  .ts { color: var(--muted); font-size: 11px; flex: 0 0 auto; opacity: .6; }

  .pausebar {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 14px; background: var(--kick); color: #04210a;
    font-weight: 700; padding: 6px 14px; border-radius: 999px;
    cursor: pointer; display: none; box-shadow: 0 4px 18px rgba(0,0,0,.5);
  }
  .pausebar.show { display: block; }
  .demoflag {
    color: #04210a; background: #ffcf33; font-weight: 800;
    padding: 2px 8px; border-radius: 5px; font-size: 11px;
  }
  .meta { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <header>
    <span class="brand">Omni<span class="edge">Chat Edge</span></span>
    <span id="status" class="status"><span class="dot"></span><span id="statusText">connecting…</span></span>
    <span id="demoFlag" class="demoflag" style="display:none">DEMO MODE</span>
    <span id="channels" class="meta"></span>
    <span class="spacer"></span>
    <div class="toggles">
      <span class="toggle twitch on" data-src="twitch">🎮 Twitch</span>
      <span class="toggle x on" data-src="x">𝕏 X</span>
      <span class="toggle kick on" data-src="kick">⚡ Kick</span>
    </div>
  </header>

  <div id="feedwrap">
    <div id="feed"></div>
  </div>
  <div id="pausebar" class="pausebar">⏸ Paused — click to resume &amp; jump to live</div>

<script>
(function () {
  var META = {
    twitch: { label: "TWITCH", emoji: "🎮", color: "#9146FF" },
    x: { label: "X", emoji: "𝕏", color: "#1D9BF0" },
    kick: { label: "KICK", emoji: "⚡", color: "#53FC18" },
  };
  var MAX_DOM = 500;
  var filters = { twitch: true, x: true, kick: true };
  var paused = false;

  var feed = document.getElementById("feed");
  var feedwrap = document.getElementById("feedwrap");
  var statusEl = document.getElementById("status");
  var statusText = document.getElementById("statusText");
  var demoFlag = document.getElementById("demoFlag");
  var channelsEl = document.getElementById("channels");
  var pausebar = document.getElementById("pausebar");

  // ---- source filter toggles ----
  document.querySelectorAll(".toggle").forEach(function (el) {
    el.addEventListener("click", function () {
      var src = el.getAttribute("data-src");
      filters[src] = !filters[src];
      el.classList.toggle("on", filters[src]);
      applyFilters();
    });
  });
  function applyFilters() {
    feed.querySelectorAll(".row").forEach(function (row) {
      var src = row.getAttribute("data-src");
      row.style.display = filters[src] ? "" : "none";
    });
    if (!paused) scrollToBottom();
  }

  // ---- pause-on-scroll-up; resume on hover-out / click ----
  feedwrap.addEventListener("scroll", function () {
    var nearBottom =
      feedwrap.scrollHeight - feedwrap.scrollTop - feedwrap.clientHeight < 40;
    setPaused(!nearBottom);
  });
  pausebar.addEventListener("click", function () {
    setPaused(false);
    scrollToBottom();
  });
  function setPaused(v) {
    paused = v;
    pausebar.classList.toggle("show", v);
  }
  function scrollToBottom() {
    feedwrap.scrollTop = feedwrap.scrollHeight;
  }

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function fmtTs(ts) {
    var d = new Date(ts);
    return (
      ("0" + d.getHours()).slice(-2) +
      ":" +
      ("0" + d.getMinutes()).slice(-2) +
      ":" +
      ("0" + d.getSeconds()).slice(-2)
    );
  }

  function addRow(m) {
    var meta = META[m.source] || { label: m.source.toUpperCase(), emoji: "", color: "#888" };
    var row = document.createElement("div");
    row.className = "row";
    row.setAttribute("data-src", m.source);
    if (!filters[m.source]) row.style.display = "none";

    var authorColor = m.color && /^#?[0-9a-fA-F]{3,8}$/.test(m.color)
      ? (m.color[0] === "#" ? m.color : "#" + m.color)
      : "";

    row.innerHTML =
      '<span class="badge ' + m.source + '">' + meta.emoji + " " + meta.label + "</span>" +
      '<span class="chan">' + esc(m.channel) + "</span>" +
      '<span class="author"' + (authorColor ? ' style="color:' + authorColor + '"' : "") + ">" +
        esc(m.author) + "</span>" +
      '<span class="text">' + esc(m.text) + "</span>" +
      '<span class="ts">' + fmtTs(m.ts) + "</span>";

    feed.appendChild(row);

    // cap DOM nodes
    while (feed.childElementCount > MAX_DOM) {
      feed.removeChild(feed.firstChild);
    }
    if (!paused) scrollToBottom();
  }

  // ---- websocket with reconnect+backoff ----
  var ws = null;
  var backoff = 1000;
  function connect() {
    var proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(proto + "://" + location.host + "/ws");

    ws.onopen = function () {
      backoff = 1000;
      statusEl.classList.add("live");
      statusText.textContent = "live";
    };
    ws.onmessage = function (ev) {
      var data;
      try { data = JSON.parse(ev.data); } catch (e) { return; }
      if (data.type === "hello") {
        if (data.meta) META = data.meta;
        demoFlag.style.display = data.demo ? "" : "none";
        var parts = [];
        if (data.channels) {
          if (data.channels.twitch && data.channels.twitch.length)
            parts.push("🎮 " + data.channels.twitch.join(", "));
          if (data.channels.kick && data.channels.kick.length)
            parts.push("⚡ " + data.channels.kick.join(", "));
          if (data.channels.x && data.channels.x.length)
            parts.push("𝕏 " + data.channels.x.join(", "));
        }
        channelsEl.textContent = parts.join("   ");
        if (data.backlog) data.backlog.forEach(addRow);
      } else if (data.type === "msg") {
        addRow(data.msg);
      }
    };
    ws.onclose = function () {
      statusEl.classList.remove("live");
      statusText.textContent = "reconnecting…";
      setTimeout(connect, backoff);
      backoff = Math.min(backoff * 2, 15000);
    };
    ws.onerror = function () { try { ws.close(); } catch (e) {} };
  }
  connect();
})();
</script>
</body>
</html>
