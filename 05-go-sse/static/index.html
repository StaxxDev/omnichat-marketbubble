<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OmniChat Go — Unified Chat Aggregator</title>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #161a22;
    --border: #262b36;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --twitch: #9146FF;
    --x: #1D9BF0;
    --kick: #53FC18;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    background: var(--panel);
  }
  .brand { font-weight: 700; font-size: 16px; letter-spacing: .3px; }
  .brand span { color: var(--kick); }
  .status { font-size: 12px; color: var(--muted); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#f33; margin-right:5px; vertical-align:middle; }
  .dot.on { background: var(--kick); }
  .toggles { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .toggle {
    cursor: pointer;
    border: 1px solid var(--border);
    background: #1b202a;
    color: var(--text);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    user-select: none;
    transition: opacity .15s, border-color .15s;
  }
  .toggle.off { opacity: .35; }
  .toggle[data-src="twitch"] { border-color: var(--twitch); }
  .toggle[data-src="x"]      { border-color: var(--x); }
  .toggle[data-src="kick"]   { border-color: var(--kick); }

  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px 20px;
  }
  .row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadein .18s ease-out;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(3px);} to { opacity:1; transform:none;} }
  .badge {
    flex: 0 0 auto;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    color: #0d0f14;
    white-space: nowrap;
    letter-spacing: .3px;
  }
  .badge.twitch { background: var(--twitch); color:#fff; }
  .badge.x      { background: var(--x); color:#fff; }
  .badge.kick   { background: var(--kick); color:#08210a; }
  .chan { flex: 0 0 auto; color: var(--muted); font-size: 12px; }
  .chan::before { content: "#"; opacity:.6; }
  .author { flex: 0 0 auto; font-weight: 700; }
  .text { flex: 1 1 auto; word-break: break-word; }
  .pausebar {
    display:none;
    position: sticky;
    bottom: 0;
    text-align:center;
    padding:6px;
    background: rgba(83,252,24,.15);
    border-top:1px solid var(--kick);
    color: var(--kick);
    font-size:12px;
    cursor:pointer;
  }
  .pausebar.show { display:block; }
</style>
</head>
<body>
  <header>
    <div class="brand">⚡ OmniChat <span>Go</span></div>
    <div class="status"><span id="dot" class="dot"></span><span id="statusText">connecting…</span></div>
    <div class="toggles">
      <div class="toggle" data-src="twitch">🎮 TWITCH</div>
      <div class="toggle" data-src="x">𝕏 X</div>
      <div class="toggle" data-src="kick">⚡ KICK</div>
    </div>
  </header>

  <div id="feed"></div>
  <div id="pausebar" class="pausebar">Paused — click to resume auto-scroll ▾</div>

<script>
(function () {
  const feed = document.getElementById("feed");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("statusText");
  const pausebar = document.getElementById("pausebar");
  const MAX = 500;

  // Source filter state.
  const visible = { twitch: true, x: true, kick: true };
  document.querySelectorAll(".toggle").forEach(function (el) {
    el.addEventListener("click", function () {
      const s = el.dataset.src;
      visible[s] = !visible[s];
      el.classList.toggle("off", !visible[s]);
      feed.querySelectorAll('.row[data-src="' + s + '"]').forEach(function (r) {
        r.style.display = visible[s] ? "flex" : "none";
      });
    });
  });

  const labels = {
    twitch: { emoji: "🎮", label: "TWITCH" },
    x:      { emoji: "𝕏", label: "X" },
    kick:   { emoji: "⚡", label: "KICK" },
  };

  // Auto-scroll, pausable when user scrolls up or hovers.
  let autoScroll = true;
  function nearBottom() {
    return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  }
  feed.addEventListener("scroll", function () {
    if (nearBottom()) { autoScroll = true; pausebar.classList.remove("show"); }
    else { autoScroll = false; pausebar.classList.add("show"); }
  });
  pausebar.addEventListener("click", function () {
    autoScroll = true;
    pausebar.classList.remove("show");
    feed.scrollTop = feed.scrollHeight;
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c];
    });
  }

  function addRow(m) {
    const meta = labels[m.source] || { emoji: "•", label: m.source.toUpperCase() };
    const row = document.createElement("div");
    row.className = "row";
    row.dataset.src = m.source;
    if (!visible[m.source]) row.style.display = "none";

    const authorColor = m.color && /^#?[0-9a-fA-F]{3,8}$/.test(m.color)
      ? (m.color[0] === "#" ? m.color : "#" + m.color)
      : "var(--text)";

    row.innerHTML =
      '<span class="badge ' + m.source + '">' + meta.emoji + " " + meta.label + '</span>' +
      '<span class="chan">' + escapeHtml(m.channel || "") + '</span>' +
      '<span class="author" style="color:' + authorColor + '">' + escapeHtml(m.author || "anon") + '</span>' +
      '<span class="text">' + escapeHtml(m.text || "") + '</span>';

    feed.appendChild(row);

    // Cap retained messages to bound memory.
    while (feed.childElementCount > MAX) feed.removeChild(feed.firstChild);

    if (autoScroll) feed.scrollTop = feed.scrollHeight;
  }

  // SSE connection with auto-reconnect (EventSource reconnects natively;
  // we also surface connection state in the header).
  let es;
  function connect() {
    es = new EventSource("/events");
    es.onopen = function () {
      dot.classList.add("on");
      statusText.textContent = "live";
    };
    es.onmessage = function (ev) {
      try { addRow(JSON.parse(ev.data)); } catch (e) {}
    };
    es.onerror = function () {
      dot.classList.remove("on");
      statusText.textContent = "reconnecting…";
      // EventSource auto-reconnects; nothing else needed.
    };
  }
  connect();
})();
</script>
</body>
</html>
