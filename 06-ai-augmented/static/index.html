<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OmniChat AI — Unified Chat Aggregator</title>
<style>
  :root {
    /* Market Bubble house palette — black + gold */
    --bg: #0a0a0b; --panel: #121211; --line: #2a2620; --txt: #f3ede0;
    --dim: #9a9384; --gold: #E8C879; --gold-dim: #b9a25a;
    --twitch: #9146FF; --x: #1D9BF0; --kick: #53FC18;
    --spam: #f5a623; --toxic: #ff4d4d; --host: #E8C879;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--txt);
    font: 14px/1.45 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    background: var(--panel); display: flex; flex-direction: column; gap: 8px;
  }
  .titlerow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .logo { font-weight: 800; letter-spacing: .3px; font-size: 16px; color: var(--gold); }
  .logo .ai { color: var(--kick); }
  .logo .mb { color: var(--dim); font-weight: 600; }
  .status { font-size: 12px; color: var(--dim); }
  .status .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
    background:#666; margin-right:5px; vertical-align:middle; }
  .status .dot.on { background: var(--kick); }
  .toggles { display: flex; gap: 8px; margin-left: auto; }
  .toggle {
    border: 1px solid var(--line); background: #1c2230; color: var(--txt);
    padding: 5px 11px; border-radius: 999px; cursor: pointer; font-size: 12px;
    font-weight: 600; user-select: none; transition: all .12s;
  }
  .toggle .b { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:6px; vertical-align:middle; }
  .toggle.off { opacity: .38; text-decoration: line-through; }
  .toggle[data-src="twitch"] .b { background: var(--twitch); }
  .toggle[data-src="x"] .b { background: var(--x); }
  .toggle[data-src="kick"] .b { background: var(--kick); }

  .banner {
    padding: 7px 10px; border-radius: 8px; background: #11151d;
    border: 1px solid var(--line); font-size: 13px; color: var(--dim);
    display: flex; align-items: center; gap: 8px; min-height: 30px;
  }
  .banner .tag {
    font-size: 10px; font-weight: 800; letter-spacing: .5px; color: #0a0a0b;
    background: linear-gradient(90deg,var(--gold),var(--gold-dim)); padding: 2px 7px;
    border-radius: 4px; white-space: nowrap;
  }
  .banner .txt { color: var(--txt); }

  #feed { flex: 1; overflow-y: auto; padding: 10px 12px; }
  .row {
    display: flex; align-items: baseline; gap: 8px; padding: 4px 6px;
    border-radius: 6px; word-break: break-word;
  }
  .row:hover { background: #12161f; }
  .badge {
    font-size: 11px; font-weight: 800; letter-spacing: .4px; padding: 2px 7px;
    border-radius: 5px; white-space: nowrap; flex: none; color: #0d0f14;
  }
  .badge.twitch { background: var(--twitch); color: #fff; }
  .badge.x { background: #fff; color: #000; }
  .badge.kick { background: var(--kick); }
  .chan { color: var(--dim); font-size: 12px; flex: none; }
  .chan::before { content: "#"; opacity: .5; }
  .author { font-weight: 700; flex: none; }
  .text { color: var(--txt); }
  .senti { margin-left: 4px; }
  /* $TICKER cashtags — this is a trading show, so make them pop */
  .cash { color: var(--gold); font-weight: 700; }
  /* Host / VIP messages (Ansem, Banks, you, guests) get a gold rail + star */
  .row.host { background: rgba(232,200,121,.08); box-shadow: inset 3px 0 0 var(--host); }
  .row.host .author { color: var(--host) !important; }
  .star { color: var(--host); margin-right: 2px; }
  .vip { font-size: 9px; font-weight: 800; color: #0a0a0b; background: var(--host);
    padding: 1px 4px; border-radius: 3px; flex: none; letter-spacing: .4px; }
  /* AI "standout" posts — high-signal, host-worthy. Gold pill + brief flash. */
  .so-badge { font-size: 9px; font-weight: 800; color: #0a0a0b; flex: none; letter-spacing: .4px;
    background: linear-gradient(90deg, var(--gold), #fff0c2); padding: 1px 6px; border-radius: 3px; }
  .row.standout { background: rgba(232,200,121,.10); box-shadow: inset 3px 0 0 var(--gold); }
  .row.standout .text { color: #fff; }
  @keyframes soflash { from { background: rgba(232,200,121,.5); } to { background: rgba(232,200,121,.10); } }
  .row.standout.flash { animation: soflash 1.8s ease-out; }

  /* Live "meaningful contribution" leaderboard */
  .contrib { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px;
    background: #11151d; border: 1px solid var(--line); font-size: 12px; overflow-x: auto; white-space: nowrap; }
  .contrib .lead { font-size: 10px; font-weight: 800; letter-spacing: .5px; color: var(--gold); flex: none; }
  .chip { display: inline-flex; align-items: center; gap: 6px; background: #1c2230;
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; flex: none; }
  .chip.top { border-color: var(--gold); box-shadow: inset 0 0 0 1px rgba(232,200,121,.35); }
  .chip .rk { color: var(--dim); }
  .chip .nm { font-weight: 700; }
  .chip .gem { color: var(--gold); font-weight: 700; }
  .chip .sc { color: var(--dim); }

  /* Likely-bot / raid messages — flagged + dimmed */
  .row.bot { opacity: .5; }
  .bot-badge { font-size: 9px; font-weight: 800; color: #fff; background: #555; border: 1px solid #777;
    padding: 1px 5px; border-radius: 3px; flex: none; letter-spacing: .3px; }

  /* End-of-stream Host Recap button + modal */
  .recap-btn { border: 1px solid var(--gold); background: transparent; color: var(--gold);
    padding: 5px 12px; border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 700; }
  .recap-btn:hover { background: rgba(232,200,121,.12); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.72); display: none;
    align-items: center; justify-content: center; z-index: 50; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--gold); border-radius: 12px;
    max-width: 740px; width: 92%; max-height: 86vh; overflow-y: auto; padding: 20px 24px; }
  .modal h2 { margin: 0; color: var(--gold); font-size: 19px; }
  .modal .sub { color: var(--dim); font-size: 12px; margin: 2px 0 14px; }
  .modal h3 { color: var(--gold); font-size: 11px; letter-spacing: .6px; text-transform: uppercase;
    margin: 16px 0 6px; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
  .modal ul { margin: 0; padding-left: 20px; } .modal li { margin: 4px 0; }
  .modal .close { float: right; cursor: pointer; color: var(--dim); font-size: 20px; line-height: 1;
    border: none; background: none; }
  .modal .close:hover { color: var(--txt); }

  .row.flag-spam { background: rgba(245,166,35,.08); }
  .row.flag-toxic { background: rgba(255,77,77,.10); }
  .flagtag {
    font-size: 10px; font-weight: 800; padding: 1px 5px; border-radius: 4px;
    flex: none; color: #0d0f14;
  }
  .flagtag.spam { background: var(--spam); }
  .flagtag.toxic { background: var(--toxic); color:#fff; }

  .paused {
    position: sticky; bottom: 0; text-align: center; padding: 6px;
    background: #1c2230; border-top: 1px solid var(--line); cursor: pointer;
    font-size: 12px; color: var(--kick); display: none;
  }
  .paused.show { display: block; }
</style>
</head>
<body>
  <header>
    <div class="titlerow">
      <div class="logo">◎ Market Bubble <span class="mb">· Unified Chat</span> <span class="ai">AI</span></div>
      <div class="status">
        <span class="dot" id="connDot"></span><span id="connText">connecting…</span>
        &nbsp;·&nbsp; <span id="aiText">AI: …</span>
        &nbsp;·&nbsp; <span id="count">0</span> msgs
      </div>
      <div class="toggles">
        <div class="toggle" data-src="twitch"><span class="b"></span>🎮 Twitch</div>
        <div class="toggle" data-src="x"><span class="b"></span>𝕏 X</div>
        <div class="toggle" data-src="kick"><span class="b"></span>⚡ Kick</div>
        <button class="recap-btn" id="recapBtn">📋 End-of-Stream Recap</button>
      </div>
    </div>
    <div class="banner">
      <span class="tag">AI · WHAT'S CHAT SAYING</span>
      <span class="txt" id="summary">waiting for chat…</span>
    </div>
    <div class="contrib">
      <span class="lead">🏆 TOP CONTRIBUTORS</span>
      <span id="contribList" style="color:var(--dim)">tracking meaningful contributions…</span>
    </div>
  </header>

  <div id="feed"></div>
  <div class="paused" id="pauseBar">▼ Paused (scrolled up) — click to resume auto-scroll</div>

  <div class="modal-bg" id="recapBg">
    <div class="modal">
      <button class="close" id="recapClose">×</button>
      <h2>📋 End-of-Stream Recap</h2>
      <div class="sub" id="recapSub">for the host</div>
      <div id="recapBody">Generating…</div>
    </div>
  </div>

<script>
(function () {
  const feed = document.getElementById("feed");
  const pauseBar = document.getElementById("pauseBar");
  const connDot = document.getElementById("connDot");
  const connText = document.getElementById("connText");
  const aiText = document.getElementById("aiText");
  const countEl = document.getElementById("count");
  const summaryEl = document.getElementById("summary");

  const MAX_ROWS = 500;
  const SOURCES = {
    twitch: { label: "TWITCH", emoji: "🎮" },
    x:      { label: "X",      emoji: "𝕏" },
    kick:   { label: "KICK",   emoji: "⚡" },
  };
  const hidden = { twitch: false, x: false, kick: false };
  let count = 0;
  let autoScroll = true;

  // Hosts / VIPs for Market Bubble — their messages get a gold rail + ⭐.
  // Override via ?vips=handle1,handle2 (e.g. your own handle).
  const params = new URLSearchParams(location.search);
  const DEFAULT_VIPS = ["blknoiz06", "banks", "ansem", "marketbubble"];
  const VIPS = new Set(
    (params.get("vips") ? params.get("vips").split(",") : [])
      .concat(DEFAULT_VIPS)
      .map((s) => s.trim().toLowerCase().replace(/^@/, ""))
      .filter(Boolean)
  );
  const rowsById = new Map(); // id -> row element, for in-place AI patching

  function isVip(author) {
    return author && VIPS.has(String(author).toLowerCase().replace(/^@/, ""));
  }

  // Linkify $TICKER cashtags (trading show) — escapes first, then wraps.
  function renderText(text) {
    const safe = esc(text);
    return safe.replace(/(^|\s)(\$[A-Za-z]{2,10})\b/g,
      (_, pre, tag) => `${pre}<span class="cash">${tag}</span>`);
  }

  // Source-filter toggles: show/hide each source
  document.querySelectorAll(".toggle").forEach((el) => {
    el.addEventListener("click", () => {
      const src = el.dataset.src;
      hidden[src] = !hidden[src];
      el.classList.toggle("off", hidden[src]);
      feed.querySelectorAll(`[data-src="${src}"]`).forEach((r) => {
        r.style.display = hidden[src] ? "none" : "";
      });
    });
  });

  // Pause auto-scroll when the user scrolls up
  feed.addEventListener("scroll", () => {
    const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 40;
    autoScroll = nearBottom;
    pauseBar.classList.toggle("show", !nearBottom);
  });
  pauseBar.addEventListener("click", () => {
    autoScroll = true;
    pauseBar.classList.remove("show");
    feed.scrollTop = feed.scrollHeight;
  });

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function addMessage(m) {
    const meta = SOURCES[m.source] || { label: m.source.toUpperCase(), emoji: "" };
    const vip = isVip(m.author);
    const row = document.createElement("div");
    row.className = "row" + (vip ? " host" : "") + (m.standout ? " standout" : "") +
      (m.bot ? " bot" : "") +
      (m.flag === "spam" ? " flag-spam" : m.flag === "toxic" ? " flag-toxic" : "");
    row.dataset.src = m.source;
    if (m.id) { row.dataset.id = m.id; rowsById.set(m.id, row); }
    if (hidden[m.source]) row.style.display = "none";

    const color = m.color && /^#/.test(m.color) ? m.color : "";
    const senti = m.sentiment ? `<span class="senti">${esc(m.sentiment)}</span>` : "";
    const flagTag =
      m.flag === "spam" ? `<span class="flagtag spam">SPAM</span>` :
      m.flag === "toxic" ? `<span class="flagtag toxic">TOXIC</span>` : "";

    row.innerHTML =
      `<span class="badge ${m.source}">${meta.emoji} ${meta.label}</span>` +
      `<span class="chan">${esc(m.channel)}</span>` +
      (vip ? `<span class="vip">⭐ VIP</span>` : "") +
      (m.bot ? `<span class="bot-badge">🤖 BOT?</span>` : "") +
      (m.standout ? `<span class="so-badge">💎 STANDOUT</span>` : "") +
      flagTag +
      `<span class="author"${color ? ` style="color:${esc(color)}"` : ""}>${esc(m.author)}</span>` +
      `<span class="text">${renderText(m.text)}<span class="senti-slot">${senti}</span></span>`;

    feed.appendChild(row);
    count++; countEl.textContent = count;
    while (feed.childElementCount > MAX_ROWS) {
      const gone = feed.firstChild;
      if (gone && gone.dataset && gone.dataset.id) rowsById.delete(gone.dataset.id);
      feed.removeChild(gone);
    }
    if (autoScroll) feed.scrollTop = feed.scrollHeight;
  }

  // Apply a late-arriving AI verdict (spam/toxic flag + sentiment) to an existing row.
  function patchMessage(p) {
    const row = p && p.id ? rowsById.get(p.id) : null;
    if (!row) return;
    if (p.flag === "spam" || p.flag === "toxic") {
      row.classList.add(p.flag === "spam" ? "flag-spam" : "flag-toxic");
      if (!row.querySelector(".flagtag")) {
        const tag = document.createElement("span");
        tag.className = "flagtag " + p.flag;
        tag.textContent = p.flag.toUpperCase();
        row.querySelector(".badge").after(tag);
      }
    }
    if (p.sentiment) {
      const slot = row.querySelector(".senti-slot");
      if (slot && !slot.textContent.trim())
        slot.innerHTML = `<span class="senti">${esc(p.sentiment)}</span>`;
    }
    if (p.standout && !row.classList.contains("standout")) {
      row.classList.add("standout", "flash");
      if (!row.querySelector(".so-badge")) {
        const b = document.createElement("span");
        b.className = "so-badge";
        b.textContent = "💎 STANDOUT";
        const anchor = row.querySelector(".vip") || row.querySelector(".chan");
        anchor.after(b);
      }
      setTimeout(() => row.classList.remove("flash"), 1900);
    }
  }

  const contribList = document.getElementById("contribList");
  function renderStats(top) {
    if (!top || !top.length) return;
    const medal = ["🥇", "🥈", "🥉"];
    contribList.innerHTML = top.map((r, i) => {
      const meta = SOURCES[r.source] || { emoji: "" };
      const rk = medal[i] || `#${i + 1}`;
      const gem = r.standouts ? `<span class="gem">💎${r.standouts}</span>` : "";
      return `<span class="chip${i < 3 ? " top" : ""}">` +
        `<span class="rk">${rk}</span>${meta.emoji} ` +
        `<span class="nm">${esc(r.author)}</span>${gem}` +
        `<span class="sc">${r.score} pts · ${r.msgs} msg</span></span>`;
    }).join(" ");
  }

  // End-of-stream Host Recap modal
  const recapBg = document.getElementById("recapBg");
  const recapBody = document.getElementById("recapBody");
  const recapSub = document.getElementById("recapSub");
  function listSection(title, items) {
    if (!items || !items.length) return "";
    return `<h3>${title}</h3><ul>` +
      items.map((x) => `<li>${esc(x)}</li>`).join("") + `</ul>`;
  }
  async function openRecap() {
    recapBg.classList.add("show");
    recapSub.textContent = "Generating…";
    recapBody.innerHTML = "Analyzing the full session chat…";
    try {
      const r = await fetch("/recap");
      const d = await r.json();
      recapSub.textContent = `${d.messages || 0} messages analyzed · ${d.mode === "claude" ? "Claude" : "heuristic"} debrief`;
      recapBody.innerHTML =
        (d.sentiment ? `<p><strong>Mood:</strong> ${esc(d.sentiment)}</p>` : "") +
        listSection("🗣️ What chat talked about", d.themes) +
        listSection("❓ Audience questions to answer", d.questions) +
        listSection("🎬 Follow-up segment ideas", d.followups) +
        listSection("🔎 Worth researching / fact-checking", d.research) +
        (d.notable ? `<h3>⭐ Notable contributors</h3><p>${esc(d.notable)}</p>` : "");
    } catch (e) {
      recapBody.innerHTML = "Could not generate recap (is the server running?).";
    }
  }
  document.getElementById("recapBtn").addEventListener("click", openRecap);
  document.getElementById("recapClose").addEventListener("click", () => recapBg.classList.remove("show"));
  recapBg.addEventListener("click", (e) => { if (e.target === recapBg) recapBg.classList.remove("show"); });

  function setAI(on, mode) {
    aiText.textContent = !on ? "AI: OFF (plain)"
      : mode === "claude" ? "AI: ON 🤖 Claude"
      : "AI: ON ⚙️ heuristic";
  }

  let ws, backoff = 500;
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      connDot.classList.add("on"); connText.textContent = "live";
      backoff = 500;
    };
    ws.onclose = () => {
      connDot.classList.remove("on"); connText.textContent = "reconnecting…";
      // Reconnect with exponential backoff (cap 8s)
      setTimeout(connect, backoff);
      backoff = Math.min(8000, backoff * 2);
    };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
    ws.onmessage = (ev) => {
      let p; try { p = JSON.parse(ev.data); } catch (e) { return; }
      if (p.type === "message") addMessage(p.data);
      else if (p.type === "patch") patchMessage(p.data);
      else if (p.type === "stats") renderStats(p.data.top);
      else if (p.type === "summary") summaryEl.textContent = p.data.text || "—";
      else if (p.type === "hello") {
        setAI(p.data.ai, p.data.mode);
        if (p.data.summary) summaryEl.textContent = p.data.summary;
      }
    };
  }
  connect();
})();
</script>
</body>
</html>
